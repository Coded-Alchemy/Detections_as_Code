# ============================================================
# Composite Action: Terraform Cache
# ------------------------------------------------------------
# Caches the .terraform provider plugin directory using a
# cache key derived from the Terraform lock file. Avoids
# re-downloading providers on every job in the pipeline.
#
# Must be called BEFORE terraform-init. If the cache misses
# (e.g. on lock file change), terraform-init will populate
# it on the next run.
# ============================================================
name: "Cache Terraform Providers"
description: "Restores or seeds the .terraform provider cache"

runs:
  using: "composite"
  steps:
    - name: Cache Terraform Providers
      uses: actions/cache@v4
      with:
        path: terraform/.terraform
        key: terraform-providers-${{ runner.os }}-${{ hashFiles('terraform/.terraform.lock.hcl') }}
        restore-keys: |
          terraform-providers-${{ runner.os }}-
