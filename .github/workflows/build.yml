# ============================================
# Github Actions build file
# ============================================
# This file describes the CI/CD automation steps.

name: Build and Test Detections
on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  build:
    runs-on: [self-hosted, linux, x64]

    env:
      SPLUNK_USERNAME: ${{ secrets.SPLUNK_USERNAME }}
      SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
      SPLUNK_URL: ${{ secrets.SPLUNK_URL }}

    # Timeout to prevent hanging jobs
    timeout-minutes: 15
    
    steps:
    # Project Checkout
    - name: Checkout
      uses: actions/checkout@v4

    # Clean workspace before starting
    - name: Clean Workspace
      run: |
        rm -rf generated/
        rm -f terraform/locals.tf

    # Install dependencies
    - name: Install Dependencies
      run: |
        python3 -m pip install --upgrade pip pyyaml

    # Generate locals.tf automatically
    - name: Generate Terraform Locals from Sigma Rules
      run: |
        chmod +x scripts/generate_locals.py
        python3 scripts/generate_locals.py
        
        echo "### Generated Terraform Configuration" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`hcl" >> $GITHUB_STEP_SUMMARY
        head -n 50 terraform/locals.tf >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

    # Install and configure Sigma with Splunk plugin
    #- name: Install Sigma
    #  run: |
    #    python3 -m pip install --upgrade pip
    #    python3 -m pip install sigma-cli
    #    sigma plugin install splunk

    # Convert Sigma rules into SPL
    - name: Convert Sigma to SPL
      run: | 
        set -e
        mkdir -p generated/splunk
        
        echo "Converting Sigma rules to SPL..."
        rule_count=0
        
        while IFS= read -r rule_file; do
          file_name=$(basename "$rule_file" .yml)
          
          if sigma convert --target splunk --pipeline splunk_windows "$rule_file" > "generated/splunk/${file_name}.spl" 2>&1; then
            if [ -s "generated/splunk/${file_name}.spl" ]; then
              echo "${file_name}.spl"
              rule_count=$((rule_count + 1))
            else
              echo "${file_name}.spl is empty"
              exit 1
            fi
          else
            echo "Failed to convert $rule_file"
            exit 1
          fi
        done < <(find sigma_rules -type f -name "*.yml")
        
        if [ "$rule_count" -eq 0 ]; then
          echo "ERROR: No rules converted"
          exit 1
        fi
        
        echo "Converted $rule_count rule(s)"
        ls -lh generated/splunk/

    # Save SPL artifact with the name spl-detections to the generated/splunk directory
    - name: Upload SPL as an artifact
      uses: actions/upload-artifact@v4.3.1
      with:
        name: spl-detections
        path: generated/splunk
        if-no-files-found: warn
        compression-level: 6

    # Install Terraform
    #- name: Install Terraform
    #  uses: hashicorp/setup-terraform@v3

    # Terraform formatting
    - name: Terraform Format
      working-directory: terraform
      run: terraform fmt -recursive

    # Initialize Terraform
    - name: Terraform Init
      working-directory: terraform
      env:
        TF_VAR_splunk_url: ${{ secrets.SPLUNK_URL }}
        TF_VAR_splunk_username: ${{ secrets.SPLUNK_USERNAME }}
        TF_VAR_splunk_password: ${{ secrets.SPLUNK_PASSWORD }}
        TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
        TF_VAR_insecure_skip_verify: "true"
      run: terraform init -reconfigure

    # Import Terraform resources
    - name: Import Existing Splunk Saved Searches
      working-directory: terraform
      env:
        TF_VAR_splunk_url: ${{ secrets.SPLUNK_URL }}
        TF_VAR_splunk_username: ${{ secrets.SPLUNK_USERNAME }}
        TF_VAR_splunk_password: ${{ secrets.SPLUNK_PASSWORD }}
        TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
        TF_VAR_insecure_skip_verify: "true"
      run: |
        echo "Importing existing saved searches from Splunk..."
        
        # Get existing searches from Splunk
        EXISTING=$(curl -k -s -u "${{ secrets.SPLUNK_USERNAME }}:${{ secrets.SPLUNK_PASSWORD }}" \
          "${{ secrets.SPLUNK_URL }}/services/saved/searches?output_mode=json&count=0" \
          | jq -r '.entry[].name' 2>/dev/null || echo "")
        
        if [ -z "$EXISTING" ]; then
          echo "No existing searches found - skipping import"
          exit 0
        fi
        
        echo "Found existing searches in Splunk"
        echo "$EXISTING" > /tmp/existing_searches.txt
        
        # Parse locals.tf using Python (path relative to terraform directory)
        chmod +x ../scripts/import_existing_searches.py
        python3 ../scripts/import_existing_searches.py > /tmp/tf_rules.txt
        
        if [ ! -s /tmp/tf_rules.txt ]; then
          echo "No detection rules found"
          exit 0
        fi
        
        echo "Found rules to process:"
        cat /tmp/tf_rules.txt
        echo ""
        
        # Import matching searches
        while IFS='|' read -r key name; do
          if [ -z "$key" ] || [ -z "$name" ]; then
            continue
          fi
          
          if grep -Fxq "$name" /tmp/existing_searches.txt; then
            echo "Found in Splunk: $name (key: $key)"
            
            if terraform state show "splunk_saved_searches.detections[\"$key\"]" >/dev/null 2>&1; then
              echo "  ✓ Already in state"
            else
              echo "  → Importing..."
              if terraform import "splunk_saved_searches.detections[\"$key\"]" "$name" 2>&1; then
                echo "  ✓ Successfully imported"
              else
                echo "  ✗ Import failed (will be created)"
              fi
            fi
          else
            echo "Not in Splunk yet: $name (key: $key) - will be created"
          fi
        done < /tmp/tf_rules.txt
        
        rm -f /tmp/existing_searches.txt /tmp/tf_rules.txt
        echo ""
        echo "Import process complete"
      continue-on-error: true

    # Clean up stale state entries
    - name: Clean Up Terraform State
      working-directory: terraform
      env:
        TF_VAR_splunk_url: ${{ secrets.SPLUNK_URL }}
        TF_VAR_splunk_username: ${{ secrets.SPLUNK_USERNAME }}
        TF_VAR_splunk_password: ${{ secrets.SPLUNK_PASSWORD }}
        TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
        TF_VAR_insecure_skip_verify: "true"
      run: |
        echo "Checking for stale resources in Terraform state..."
        
        # Get list of saved searches in state
        STATE_RESOURCES=$(terraform state list | grep 'splunk_saved_searches.detections' || echo "")
        
        if [ -z "$STATE_RESOURCES" ]; then
          echo "No resources in state to check"
          exit 0
        fi
        
        # Get existing searches from Splunk
        EXISTING=$(curl -k -s -u "${{ secrets.SPLUNK_USERNAME }}:${{ secrets.SPLUNK_PASSWORD }}" \
          "${{ secrets.SPLUNK_URL }}/services/saved/searches?output_mode=json&count=0" \
          | jq -r '.entry[].name' 2>/dev/null || echo "")
        
        echo "$EXISTING" > /tmp/existing_searches.txt
        
        # Check each resource in state
        echo "$STATE_RESOURCES" | while read -r resource; do
          echo "Checking: $resource"
          
          # Extract the resource name from state
          RESOURCE_NAME=$(terraform state show "$resource" 2>/dev/null | grep -m 1 'name ' | awk -F'"' '{print $2}' || echo "")
          
          if [ -n "$RESOURCE_NAME" ]; then
            # Check if it exists in Splunk
            if grep -Fxq "$RESOURCE_NAME" /tmp/existing_searches.txt; then
              echo "  ✓ Resource exists in Splunk"
            else
              echo "  ✗ Resource not found in Splunk, removing from state"
              terraform state rm "$resource" || true
            fi
          else
            echo "  ⚠ Could not determine resource name, skipping"
          fi
        done
        
        rm -f /tmp/existing_searches.txt
        echo "State cleanup complete"
      continue-on-error: true

    # Refresh Terraform state
    - name: Terraform Refresh
      working-directory: terraform
      env:
        TF_VAR_splunk_url: ${{ secrets.SPLUNK_URL }}
        TF_VAR_splunk_username: ${{ secrets.SPLUNK_USERNAME }}
        TF_VAR_splunk_password: ${{ secrets.SPLUNK_PASSWORD }}
        TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
        TF_VAR_insecure_skip_verify: "true"
      run: |
        echo "Refreshing Terraform state..."
        terraform apply -refresh-only -auto-approve || echo "Refresh completed with warnings"
      continue-on-error: true

    # Test Terraform before deployment
    - name: Terraform Validate
      working-directory: terraform
      env:
        TF_VAR_splunk_url: ${{ secrets.SPLUNK_URL }}
        TF_VAR_splunk_username: ${{ secrets.SPLUNK_USERNAME }}
        TF_VAR_splunk_password: ${{ secrets.SPLUNK_PASSWORD }}
        TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
        TF_VAR_insecure_skip_verify: "true"
      run: terraform validate

    # Terraform plan
    - name: Terraform Plan
      id: plan
      working-directory: terraform
      env:
        TF_VAR_splunk_url: ${{ secrets.SPLUNK_URL }}
        TF_VAR_splunk_username: ${{ secrets.SPLUNK_USERNAME }}
        TF_VAR_splunk_password: ${{ secrets.SPLUNK_PASSWORD }}
        TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
        TF_VAR_insecure_skip_verify: "true"
      run: |
        terraform plan -out=tfplan
        terraform show tfplan

    # Terraform apply
    - name: Terraform Apply
      working-directory: terraform
      env:
        TF_VAR_splunk_url: ${{ secrets.SPLUNK_URL }}
        TF_VAR_splunk_username: ${{ secrets.SPLUNK_USERNAME }}
        TF_VAR_splunk_password: ${{ secrets.SPLUNK_PASSWORD }}
        TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
        TF_VAR_insecure_skip_verify: "true"
      run: |
        terraform apply tfplan
        
        echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Deployed Detection Rules:**" >> $GITHUB_STEP_SUMMARY
        terraform output -json deployed_detections | jq -r 'to_entries[] | "- **\(.value.name)** (Severity: \(.value.severity))"' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Total Rules Deployed:** $(terraform output -raw detection_count)" >> $GITHUB_STEP_SUMMARY

    # Clean up
    - name: Cleanup
      if: always()
      run: |
        echo "Cleaning up temporary files..."
        rm -rf terraform/.terraform/
        rm -f terraform/tfplan
        rm -f terraform/terraform.tfstate.backup