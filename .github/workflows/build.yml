name: Detection-as-Code Pipeline

on:
  pull_request:
    branches: ["main", "dev"]
  push:
    branches: ["main"]

concurrency:
  group: splunk-detections-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ==============================
  # CI JOB (Validation Only)
  # ==============================
  ci:
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.15"

      - name: Install Python Dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pyyaml sigma-cli

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Validate Sigma Rules
        run: |
          set -euo pipefail
          sigma validate sigma_rules/

      - name: Convert Sigma to SPL
        run: |
          set -euo pipefail
          mkdir -p generated/splunk

          rule_count=0

          while IFS= read -r rule_file; do
            file_name=$(basename "$rule_file" .yml)

            sigma convert \
              --target splunk \
              --pipeline splunk_windows \
              "$rule_file" \
              > "generated/splunk/${file_name}.spl"

            if [ ! -s "generated/splunk/${file_name}.spl" ]; then
              echo "Conversion failed for $rule_file"
              exit 1
            fi

            rule_count=$((rule_count + 1))
          done < <(find sigma_rules -type f -name "*.yml")

          if [ "$rule_count" -eq 0 ]; then
            echo "No Sigma rules found."
            exit 1
          fi

          echo "Converted $rule_count rule(s)"

      - name: Upload Generated SPL
        uses: actions/upload-artifact@v4
        with:
          name: spl-detections
          path: generated/splunk

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          terraform plan -no-color > plan.txt
          cat plan.txt

      - name: Add Plan to Summary
        run: |
          echo "## Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat terraform/plan.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY


  # ==============================
  # CD JOB (Main branch Only)
  # ==============================
  cd:
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 20

    env:
      TF_VAR_splunk_url: ${{ secrets.SPLUNK_URL }}
      TF_VAR_splunk_username: ${{ secrets.SPLUNK_USERNAME }}
      TF_VAR_splunk_password: ${{ secrets.SPLUNK_PASSWORD }}
      TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}
      TF_VAR_insecure_skip_verify: "true"

      SPLUNK_URL: ${{ secrets.SPLUNK_URL }}
      SPLUNK_USERNAME: ${{ secrets.SPLUNK_USERNAME }}
      SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Capture Terraform Outputs
        id: outputs
        working-directory: terraform
        run: |
          terraform output -json > outputs.json
          cat outputs.json

      - name: Verify Saved Searches in Splunk
        run: |
          set -euo pipefail

          echo "Verifying scheduled searches..."

          EXPECTED_COUNT=$(terraform -chdir=terraform output -raw detection_count || echo "0")

          ACTUAL_COUNT=$(curl -k -s -u "$SPLUNK_USERNAME:$SPLUNK_PASSWORD" \
            "$SPLUNK_URL/services/saved/searches?output_mode=json&count=0" \
            | jq '[.entry[] | select(.content.is_scheduled == "1")] | length')

          echo "Expected: $EXPECTED_COUNT"
          echo "Actual:   $ACTUAL_COUNT"

          if [ "$EXPECTED_COUNT" != "$ACTUAL_COUNT" ]; then
            echo "Mismatch in detection count!"
            exit 1
          fi

          echo "Verification successful."

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total Detections Deployed:** $(terraform -chdir=terraform output -raw detection_count)" >> $GITHUB_STEP_SUMMARY
