# T1560.001 - Archive Collected Data: Archive via Utility

title: Data Archiving Activity
id: e8f9a0b1-c2d3-4e5f-6a7b-8c9d0e1f2a3b
status: experimental
description: Detects creation of archives that may contain sensitive data
references:
    - https://attack.mitre.org/techniques/T1560/001/
author: Taji Abdullah
date: 2026-02-15
tags:
    - attack.collection
    - attack.t1560.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_tool:
        Image|endswith:
            - '\7z.exe'
            - '\winrar.exe'
            - '\rar.exe'
            - '\winzip.exe'
            - '\tar.exe'
    selection_powershell:
        CommandLine|contains:
            - 'Compress-Archive'
    selection_path:
        CommandLine|contains:
            - 'Documents'
            - 'Desktop'
            - 'Users'
            - '.txt'
            - '.doc'
            - '.xls'
            - '.pdf'
    condition: (selection_tool or selection_powershell) and selection_path
falsepositives:
    - Legitimate file compression
    - Backup operations
    - Data archival
level: medium