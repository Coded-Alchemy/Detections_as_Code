# T1027 - Obfuscated Files or Information

title: Suspicious Encoded or Obfuscated PowerShell Execution
id: a8b9c0d1-e2f3-4a5b-6c7d-8e9f0a1b2c3d
status: stable
description: Detects suspicious encoded or heavily obfuscated PowerShell execution consistent with defense evasion techniques.
references:
  - https://attack.mitre.org/techniques/T1027/
author: Taji Abdullah
date: 2026-02-15
modified: 2026-02-19

tags:
  - attack.defense_evasion
  - attack.execution
  - attack.t1027
  - attack.t1059.001

logsource:
  category: process_creation
  product: windows

detection:

  # Focus only on PowerShell engines
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'

  # Strong encoded command indicators
  selection_encoding:
    CommandLine|contains:
      - '-enc '
      - '-encodedcommand'
      - 'FromBase64String'
      - '::FromBase64String'

  # High-entropy or string concatenation style obfuscation
  selection_obfuscation_patterns:
    CommandLine|re: '(?i)(\$\w+\s*\+\s*\$\w+|char\s*\(|\[[cC]har\]|-join|-bxor)'

  # Long Base64 blob detection (strong signal)
  selection_long_base64:
    CommandLine|re: '(?i)[A-Za-z0-9+/]{200,}={0,2}'

  # Optional: suspicious parent processes
  selection_suspicious_parent:
    ParentImage|endswith:
      - '\winword.exe'
      - '\excel.exe'
      - '\outlook.exe'
      - '\wscript.exe'
      - '\cscript.exe'

  condition: selection_powershell and (
               selection_encoding
               or selection_long_base64
               or (selection_obfuscation_patterns and selection_suspicious_parent)
             )

falsepositives:
  - Administrative automation using encoded PowerShell
  - Configuration management tools (SCCM, Intune, Ansible)
  - Developer testing scripts

level: high
