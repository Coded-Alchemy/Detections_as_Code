title: Large Upload to Cloud Services
id: c2d3e4f5-a6b7-8c9d-0e1f-2a3b4c5d6e7f
status: experimental
description: Detects large uploads to cloud storage services
references:
    - https://attack.mitre.org/techniques/T1567/002/
author: SOC Team
date: 2026-02-15
tags:
    - attack.exfiltration
    - attack.t1567.002
logsource:
    category: proxy
detection:
    selection_url:
        url|contains:
            - 'dropbox.com'
            - 'drive.google.com'
            - 'onedrive.live.com'
            - 'box.com'
            - 'mediafire.com'
            - 'mega.nz'
            - 'wetransfer.com'
    selection_method:
        http_method: POST
    timeframe: 10m
    condition: (selection_url and selection_method) | sum(bytes) by src_ip > 100000000
falsepositives:
    - Legitimate cloud storage usage
    - File synchronization
    - Backup operations
level: medium