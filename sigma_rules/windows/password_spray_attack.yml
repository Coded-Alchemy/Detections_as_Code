# T1110.003 - Brute Force: Password Spraying

title: Password Spray Attack
id: c0d1e2f3-a4b5-6c7d-8e9f-0a1b2c3d4e5f
status: stable
description: Detects password spray attacks across multiple accounts
references:
    - https://attack.mitre.org/techniques/T1110/003/
author: Taji Abdullah
date: 2026-02-15
tags:
    - attack.credential_access
    - attack.t1110.003
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4625
    timeframe: 10m
    condition: selection | count(TargetUserName) by IpAddress > 10
falsepositives:
    - Misconfigured applications
    - Legitimate account lockouts
    - Password manager issues
level: high