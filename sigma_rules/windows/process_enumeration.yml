# T1057 - Process Discovery

title: Process Enumeration
id: a4b5c6d7-e8f9-0a1b-2c3d-4e5f6a7b8c9d
status: stable
description: Detects excessive process enumeration activity
references:
    - https://attack.mitre.org/techniques/T1057/
author: Taji Abdullah
date: 2026-02-15
tags:
    - attack.discovery
    - attack.t1057
logsource:
    category: process_creation
    product: windows
detection:
    selection_tasklist:
        Image|endswith: '\tasklist.exe'
    selection_powershell:
        CommandLine|contains:
            - 'Get-Process'
            - 'gwmi win32_process'
    selection_wmic:
        CommandLine|contains: 'wmic process'
    condition: 1 of selection_*
falsepositives:
    - System monitoring tools
    - Administrative scripts
    - Security software
level: low