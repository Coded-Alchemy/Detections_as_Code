# T1078.003 - Valid Accounts: Local Accounts

title: Suspicious Local Admin Activity
id: d5e6f7a8-b9c0-1d2e-3f4a-5b6c7d8e9f0a
status: experimental
description: Detects unusual activity from local administrator accounts
references:
    - https://attack.mitre.org/techniques/T1078/003/
author: Taji Abdullah
date: 2026-02-15
tags:
    - attack.privilege_escalation
    - attack.defense_evasion
    - attack.t1078.003
logsource:
    product: windows
    service: security
detection:
    selection_eventid:
        EventID: 4672
    selection_privileges:
        PrivilegeList|contains:
            - 'SeDebugPrivilege'
            - 'SeBackupPrivilege'
            - 'SeRestorePrivilege'
    filter_admin:
        SubjectUserName: 'Administrator'
    condition: selection_eventid and selection_privileges and not filter_admin
falsepositives:
    - System administrators
    - Automated processes
    - Backup software
level: medium