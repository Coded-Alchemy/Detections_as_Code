# T1053.005 - Scheduled Task/Job: Scheduled Task

title: Suspicious Scheduled Task Creation
id: 9c8b7a6f-5e4d-3c2b-1a0f-9e8d7c6b5a4e
status: stable
description: Detects creation of scheduled tasks with suspicious characteristics
references:
    - https://attack.mitre.org/techniques/T1053/005/
author: Taji Abdullah
date: 2026-02-15
tags:
    - attack.persistence
    - attack.t1053.005
    - attack.execution
logsource:
    product: windows
    service: security
    definition: 'Requirements: Audit Other Object Access Events > Success'
detection:
    selection_eventid:
        EventID: 4698
    selection_content:
        TaskContent|contains:
            - 'powershell'
            - 'cmd.exe'
            - 'wscript'
            - 'cscript'
            - 'mshta'
            - 'rundll32'
            - 'regsvr32'
            - 'http://'
            - 'https://'
            - 'ftp://'
    condition: selection_eventid and selection_content
falsepositives:
    - Legitimate software installations
    - System maintenance tasks
    - Administrative scripts
level: high