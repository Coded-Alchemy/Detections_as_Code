# T1041 - Exfiltration Over C2 Channel

title: Unusual Outbound Traffic Volume
id: a0b1c2d3-e4f5-6a7b-8c9d-0e1f2a3b4c5d
status: experimental
description: Detects large volumes of outbound traffic to unusual destinations
references:
    - https://attack.mitre.org/techniques/T1041/
author: Taji Abdullah
date: 2026-02-15
tags:
    - attack.exfiltration
    - attack.t1041
logsource:
    category: firewall
detection:
    selection:
        action: allowed
        direction: outbound
    timeframe: 1h
    condition: selection | sum(bytes) by src_ip > 1000000000
falsepositives:
    - Cloud backups
    - Legitimate file transfers
    - CDN usage
    - Video streaming
level: medium